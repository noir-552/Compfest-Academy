services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: file:/app/data/dev.db
      PORT: 3001
      UPLOADS_DIR: /app/data/uploads
    ports:
      - "3001:3001"
    volumes:
      - backend-data:/app/data

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_PROXY_TARGET: http://backend:3001
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  backend-data:
