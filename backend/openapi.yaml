  /admin/simulate-next-day:
    post:
      tags: [admin]
      summary: Advance the virtual clock by one day and run the overdue sweep
      description: >
        The only way orders become overdue in this system — there is no
        real-time cron. Advances AppState.dayOffset, then finds every order
        whose slaDeadline has passed and isn't in a final status, force-flips
        it to DIKEMBALIKAN, refunds finalTotal to the buyer's wallet,
        restores product stock, restores voucher quota (if a voucher was
        used), and cancels any AVAILABLE/TAKEN delivery job — each guarded by
        its own idempotency flag (isRefunded/isStockRestored/
        isVoucherRestored) so repeated sweeps never double-apply. Requires
        activeRole=ADMIN.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  virtualDate: { type: string, format: date-time }
                  processed:
                    type: array
                    items:
                      type: object
                      properties:
                        orderId: { type: string }
                        actions:
                          type: array
                          items: { type: string }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }

