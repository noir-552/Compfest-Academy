    get:
      tags: [admin]
      summary: Orders past SLA deadline (pending sweep) and already-returned orders
      security: [{ bearerAuth: [] }]
      description: Requires activeRole=ADMIN.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  pending:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        storeId: { type: string }
                        storeName: { type: string }
                        buyerUsername: { type: string }
                        currentStatus: { $ref: '#/components/schemas/OrderStatus' }
                        finalTotal: { type: integer }
                        slaDeadline: { type: string, format: date-time }
                        createdAt: { type: string, format: date-time }
                  returned:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        storeId: { type: string }
                        storeName: { type: string }
                        buyerUsername: { type: string }
                        currentStatus: { $ref: '#/components/schemas/OrderStatus' }
                        finalTotal: { type: integer }
                        slaDeadline: { type: string, format: date-time }
                        createdAt: { type: string, format: date-time }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }

