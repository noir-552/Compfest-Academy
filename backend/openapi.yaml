          application/json:
            schema:
              type: object
              required: [code, discountType, discountValue, usageLimit, expiryDate]
              properties:
                code: { type: string, pattern: '^[A-Z0-9]{4,20}$' }
                discountType: { $ref: '#/components/schemas/DiscountType' }
                discountValue:
                  type: integer
                  description: 1-100 if discountType=PERCENT, >=1 if FIXED.
                usageLimit: { type: integer, minimum: 1 }
                expiryDate: { type: string, format: date-time, description: Must be in the future. }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties: { voucher: { $ref: '#/components/schemas/Voucher' } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: DISCOUNT_CODE_TAKEN
          content:
