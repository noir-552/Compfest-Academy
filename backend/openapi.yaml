            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '404':
          description: JOB_NOT_FOUND
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '409':
          description: "INVALID_STATUS — job is not TAKEN."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

